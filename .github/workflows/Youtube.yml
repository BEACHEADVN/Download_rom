name: ReVanced Magisk Module

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" # Chạy vào phút thứ 0 của mỗi giờ
permissions:
  contents: write

jobs:
  check-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ===== PULL STATE =====
      - name: Pull latest
        run: git pull origin main || true

      # ===== GET RELEASE INFO (SAFE MODE) =====
      - name: Get Latest Release
        id: revanced
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
            import os, requests, json, re
            repo = "j-hc/revanced-magisk-module"
            headers = {"Authorization": f"token {os.environ['GH_TOKEN']}"}
            try:
                response = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", headers=headers)
                data = response.json()
                tag = data.get('tag_name', '')
                date = data.get('published_at', data.get('created_at', ''))
                html_url = data.get('html_url', '')
                
                assets = data.get('assets', [])
                pattern = re.compile(r"youtube-morphe-module-v.*\.zip$", re.IGNORECASE)
                
                zip_asset = next((a for a in assets if pattern.search(a['name'])), None)
                if not zip_asset:
                    zip_asset = next((a for a in assets if a['name'].endswith('.zip')), None)
                
                if zip_asset:
                    file_name = zip_asset['name']
                    size = zip_asset['size']
                else:
                    file_name = f"revanced-magisk-module-{tag}.zip"
                    size = 0
                
                with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                    f.write(f"tag={tag}\nfile_name={file_name}\nsize={size}\ndate={date}\nhtml_url={html_url}\n")
            except Exception as e:
                print(f"Error: {e}"); exit(1)

      # ===== CHECK STATE =====
      - name: Check State
        id: check
        run: |
          touch revanced_state.txt
          if [ "${{ steps.revanced.outputs.tag }}" = "$(cat revanced_state.txt)" ]; then 
            echo "skip=true" >> $GITHUB_OUTPUT
          else 
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ===== PARSE DATA TO ENV (XỬ LÝ ĐĂNG KÝ BIẾN SẠCH) =====
      - name: Parse Data to Env
        if: steps.check.outputs.skip != 'true'
        id: parse
        run: |
          # Tính dung lượng file
          SIZE_STR=$(python3 -c "
          b = int('${{ steps.revanced.outputs.size }}')
          for unit in ['B','KB','MB']:
              if b < 1024: print(f'{b:.2f} {unit}'); exit()
              b /= 1024
          print(f'{b:.2f} MB')
          ")
          echo "FORMATED_SIZE=$SIZE_STR" >> $GITHUB_ENV

          # Tính ngày tháng múi giờ VN
          DATE_STR=$(python3 -c "
          import datetime
          try:
              date_obj = datetime.datetime.strptime('${{ steps.revanced.outputs.date }}', '%Y-%m-%dT%H:%M:%SZ') + datetime.timedelta(hours=7)
              print(date_obj.strftime('%d/%m/%Y %H:%M'))
          except:
              print('N/A')
          ")
          echo "FORMATED_DATE=$DATE_STR" >> $GITHUB_ENV

      # ===== NOTIFICATION (TELEGRAM INFO) =====
      - name: Send Notification to Telegram
        if: steps.check.outputs.skip != 'true'
        uses: xireiki/channel-post@v1
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          context: |
            <b>🚀 ReVanced Morphe Module New Update!</b>

            📦 Tên file: <code>${{ steps.revanced.outputs.file_name }}</code>
            📊 Dung lượng: <code>${{ env.FORMATED_SIZE }}</code>
            📅 Cập nhật: <code>${{ env.FORMATED_DATE }}</code>

            <a href="${{ steps.revanced.outputs.html_url }}">🔗 Xem chi tiết và tải về trên GitHub</a>
          parse_mode: HTML
          method: sendMessage

      # ===== SAVE & COMMIT (SAFE PUSH) =====
      - name: Save new state
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.revanced.outputs.tag }}" > revanced_state.txt
          git add revanced_state.txt
          git commit -m "Update ReVanced Magisk Module state to ${{ steps.revanced.outputs.tag }}" || exit 0
          git pull --rebase origin main
          git push origin main
