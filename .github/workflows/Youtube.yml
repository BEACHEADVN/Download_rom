name: ReVanced Magisk Module

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" # Chạy vào phút thứ 0 của mỗi giờ
permissions:
  contents: write

jobs:
  check-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ===== PULL STATE =====
      - name: Pull latest
        run: git pull origin main || true

      # ===== GET RELEASE INFO (SAFE MODE) =====
      - name: Get Latest Release
        id: revanced
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
            import os, requests, json, re
            repo = "j-hc/revanced-magisk-module"
            headers = {"Authorization": f"token {os.environ['GH_TOKEN']}"}
            try:
                response = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", headers=headers)
                data = response.json()
                tag = data.get('tag_name', '')
                date = data.get('published_at', data.get('created_at', ''))
                html_url = data.get('html_url', '')
                
                assets = data.get('assets', [])
                
                # Biểu thức chính quy để tìm file dạng youtube-morphe-module-v*.zip
                pattern = re.compile(r"youtube-morphe-module-v.*\.zip$", re.IGNORECASE)
                
                # Tìm asset khớp với pattern, nếu không có thì tìm file .zip bất kỳ làm fallback
                zip_asset = next((a for a in assets if pattern.search(a['name'])), None)
                if not zip_asset:
                    zip_asset = next((a for a in assets if a['name'].endswith('.zip')), None)
                
                if zip_asset:
                    file_name = zip_asset['name']
                    dl_url = zip_asset['browser_download_url']
                    size = zip_asset['size']
                else:
                    file_name = f"revanced-magisk-module-{tag}.zip"
                    dl_url = f"https://github.com/{repo}/archive/refs/tags/{tag}.zip"
                    size = 0
                
                with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                    f.write(f"tag={tag}\nfile_name={file_name}\ndl_url={dl_url}\nsize={size}\ndate={date}\nhtml_url={html_url}\n")
            except Exception as e:
                print(f"Error: {e}"); exit(1)

      # ===== CHECK STATE =====
      - name: Check State
        id: check
        run: |
          touch revanced_state.txt
          if [ "${{ steps.revanced.outputs.tag }}" = "$(cat revanced_state.txt)" ]; then 
            echo "skip=true" >> $GITHUB_OUTPUT
          else 
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ===== DOWNLOAD =====
      - name: Download Asset
        if: steps.check.outputs.skip != 'true'
        run: |
          curl -L -o "revanced_temp.zip" "${{ steps.revanced.outputs.dl_url }}"

      # ===== NOTIFICATION (TELEGRAM LINK) =====
      - name: Send Notification to Telegram
        if: steps.check.outputs.skip != 'true'
        uses: xireiki/channel-post@v1
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_USER_ID }}
          context: |
            https://github.com/j-hc/revanced-magisk-module
          parse_mode: HTML
          method: sendMessage

      # ===== UPLOAD FILE VIA CURL (HỖ TRỢ FILE LỚN ĐẾN 2GB) =====
      - name: Upload to Telegram via Curl
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ steps.revanced.outputs.tag }}
          URL: ${{ steps.revanced.outputs.html_url }}
          SIZE: ${{ steps.revanced.outputs.size }}
          DATE: ${{ steps.revanced.outputs.date }}
          FILE_NAME: ${{ steps.revanced.outputs.file_name }}
        run: |
          # 1. Đổi tên file từ tạm sang file gốc tìm được tự động
          if [ -f "revanced_temp.zip" ]; then
            mv "revanced_temp.zip" "${{ env.FILE_NAME }}"
          fi

          # 2. Xử lý tính dung lượng (Giữ đúng logic cũ của bạn)
          SIZE_STR=$(python3 -c "
          b = int('${{ env.SIZE }}')
          for unit in ['B','KB','MB']:
              if b < 1024: print(f'{b:.2f} {unit}'); exit()
              b /= 1024
          print(f'{b:.2f} MB')
          ")

          # 3. Xử lý ngày tháng giờ VN (Giữ đúng logic cũ của bạn)
          DATE_STR=$(python3 -c "
          import datetime
          try:
              date_obj = datetime.datetime.strptime('${{ env.DATE }}', '%Y-%m-%dT%H:%M:%SZ') + datetime.timedelta(hours=7)
              print(date_obj.strftime('%d/%m/%Y %H:%M'))
          except:
              print('N/A')
          ")

          # 4. Tạo nội dung caption HTML
          CAPTION=$(cat <<EOF
          <b>🚀 ReVanced Morphe Module Update!</b>

          📦 Tên file: <code>${{ env.FILE_NAME }}</code>
          📊 Dung lượng: <code>$SIZE_STR</code>
          📅 Cập nhật: <code>$DATE_STR</code>

          <a href='${{ env.URL }}'>🔗 Xem chi tiết trên GitHub</a>
          EOF
          )

          # 5. Sử dụng curl hệ thống để đẩy file đi ổn định
          curl -v -F chat_id="$CHAT_ID" \
               -F document="@${{ env.FILE_NAME }}" \
               -F caption="$CAPTION" \
               -F parse_mode="HTML" \
               "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"

      # ===== SAVE & COMMIT (SAFE PUSH) =====
      - name: Save new state
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.revanced.outputs.tag }}" > revanced_state.txt
          git add revanced_state.txt
          git commit -m "Update ReVanced Magisk Module state to ${{ steps.revanced.outputs.tag }}" || exit 0
          git pull --rebase origin main
          git push origin main
