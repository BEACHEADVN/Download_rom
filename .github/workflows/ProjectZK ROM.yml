name: ProjectZK ROM Mirror

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest
        run: git pull origin main || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 curl jq
          pip install beautifulsoup4 requests

      # ===== LẤY THÔNG TIN QUA WEB SCRAPING (PHƯƠNG PHÁP CUỐI CÙNG) =====
      - name: Get Latest ROM
        id: rom
        shell: python
        run: |
            import os, requests, sys
            from bs4 import BeautifulSoup

            # URL thư mục chứa file
            folder_url = "https://sourceforge.net/projects/projectzk/files/ProjectZK/ZK-EU/ZKOS3.0/"
            headers = {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8'
            }
            
            try:
                response = requests.get(folder_url, headers=headers, timeout=30)
                if response.status_code != 200:
                    print(f"❌ Không thể truy cập web (Status: {response.status_code})")
                    sys.exit(1)
                
                soup = BeautifulSoup(response.text, 'html.parser')
                
                # Tìm tất cả các link file trong bảng (thường nằm trong thẻ <a> có title bắt đầu bằng "Click to download")
                socrates_files = []
                for link in soup.find_all('a', href=True):
                    file_url = link['href']
                    file_name = link.get_text(strip=True)
                    
                    if "SOCRATES" in file_name.upper() and file_name.endswith(".zip"):
                        # Xây dựng URL chuẩn
                        if "sourceforge.net" not in file_url:
                            # Link thường có dạng /projects/projectzk/files/.../file.zip/download
                            clean_url = "https://sourceforge.net" + file_url.split('/download')[0]
                        else:
                            clean_url = file_url.split('/download')[0]
                        
                        socrates_files.append({
                            'name': file_name,
                            'url': clean_url
                        })

                if not socrates_files:
                    print("❌ Không tìm thấy file SOCRATES nào trên giao diện web!")
                    sys.exit(1)

                # SourceForge thường để file mới lên đầu, nhưng để chắc chắn ta lấy file đầu tiên tìm thấy
                latest_file = socrates_files[0]
                
                file_name = latest_file['name']
                # Chuyển sang link download cho aria2
                download_url = latest_file['url'].replace("sourceforge.net/projects", "downloads.sourceforge.net/project")
                
                with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                    f.write(f"file={file_name}\nurl={download_url}\n")
                
                print(f"✅ Tìm thấy qua Scraping: {file_name}")
                print(f"🔗 URL: {download_url}")
                
            except Exception as e:
                print(f"❌ Lỗi Scraping: {e}")
                sys.exit(1)

      # ===== KIỂM TRA TRẠNG THÁI TRÊN PIXELDRAIN =====
      - name: Check Uploaded State
        id: check
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          STATE_FILE="projectzk_uploaded.txt"
          touch $STATE_FILE

          if grep -Fq "$FILE|" "$STATE_FILE"; then
            ID=$(grep -F "$FILE|" "$STATE_FILE" | head -n1 | cut -d '|' -f2)
            API="https://pixeldrain.com/api/file/$ID/info"
            RESPONSE=$(curl -s "$API")
            SUCCESS=$(echo "$RESPONSE" | jq -r '.success')

            if [ "$SUCCESS" = "true" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "File vẫn tồn tại trên Pixeldrain -> SKIP"
            else
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "File đã mất -> Re-upload"
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ===== TẢI ROM (ARIA2) =====
      - name: Download ROM
        if: steps.check.outputs.skip != 'true'
        run: |
          aria2c -x 16 -s 16 -k 1M --continue=true \
            -o "${{ steps.rom.outputs.file }}" \
            "${{ steps.rom.outputs.url }}"

      # ===== UPLOAD LÊN PIXELDRAIN =====
      - name: Upload to Pixeldrain
        if: steps.check.outputs.skip != 'true'
        id: pd
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          RESPONSE=$(curl -u ":$PD_API_KEY" -F "file=@${FILE}" https://pixeldrain.com/api/file)
          ID=$(echo "$RESPONSE" | jq -r '.id')

          if [ "$ID" = "null" ] || [ -z "$ID" ]; then
            echo "Upload failed"; exit(1)
          fi

          SIZE_RAW=$(ls -lh "$FILE" | awk '{print $5}')
          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "size=$SIZE_RAW" >> $GITHUB_OUTPUT
          echo "link=https://pixeldrain.com/u/$ID" >> $GITHUB_OUTPUT

      # ===== GỬI THÔNG BÁO TELEGRAM (NAME CARD) =====
      - name: Send Telegram Notification
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          LINK="${{ steps.pd.outputs.link }}"
          SIZE="${{ steps.pd.outputs.size }}"
          
          CAPTION="<b>✨ ProjectZK New Update</b>%0A"
          CAPTION+="<i>Socrates (K60 Pro) EU Edition</i>%0A"
          CAPTION+="━━━━━━━━━━━━━━━━━━%0A"
          CAPTION+="📦 <b>File:</b> <code>$FILE</code>%0A"
          CAPTION+="📊 <b>Dung lượng:</b> <code>$SIZE</code>%0A"
          CAPTION+="📅 <b>Trạng thái:</b> <code>Mirrored to Pixeldrain</code>%0A%0A"
          CAPTION+="🔗 <a href=\"$LINK\">Tải xuống ngay (Pixeldrain)</a>"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="$CAPTION" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"

      # ===== LƯU STATE =====
      - name: Save State
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FILE="${{ steps.rom.outputs.file }}"
          ID="${{ steps.pd.outputs.id }}"
          STATE_FILE="projectzk_uploaded.txt"

          sed -i "\|^$FILE|d" "$STATE_FILE"
          echo "$FILE|$ID" >> "$STATE_FILE"

          git add "$STATE_FILE"
          git commit -m "Mirror ZKOS: $FILE" || exit 0
          git pull --rebase origin main
          git push origin main
