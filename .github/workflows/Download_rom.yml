name: Socrates ROM Mirror (Auto)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ===== BƯỚC 1: DỌN DẸP Ổ CỨNG (Sửa lỗi Error 3) =====
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Pull latest state
        run: git pull origin main || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 curl jq

      # ===== BƯỚC 2: LẤY LINK ROM MỚI NHẤT =====
      - name: Get Latest ROM
        id: rom
        run: |
          BASE_URL="https://sourceforge.net/projects/eliteroms/files/HyperOS-STABLE-UPDATES/HyperOS-v3.0/"
          HTML=$(curl -sL "$BASE_URL")

          # Tìm file zip mới nhất dựa trên tên SOCRATES
          FILE=$(echo "$HTML" | grep -o 'EliteRomLite_v4.03_SOCRATES[^"]*zip' | sort -V | tail -n 1)
          
          # URL SourceForge trực tiếp
          URL="https://downloads.sourceforge.net/project/eliteroms/HyperOS-STABLE-UPDATES/HyperOS-v3.0/$FILE"

          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "🚀 ROM tìm thấy: $FILE"

      # ===== BƯỚC 3: KIỂM TRA TRẠNG THÁI (TRÁNH UPLOAD TRÙNG) =====
      - name: Check Uploaded State
        id: check
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          STATE_FILE="rom_uploaded.txt"
          touch $STATE_FILE

          if grep -Fq "$FILE|" "$STATE_FILE"; then
            ID=$(grep -F "$FILE|" "$STATE_FILE" | head -n1 | cut -d '|' -f2)
            
            # Kiểm tra xem link Pixeldrain còn sống không
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pixeldrain.com/api/file/$ID/info")
            
            if [ "$STATUS" = "200" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "✅ File đã tồn tại và link vẫn sống. SKIP."
            else
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "⚠️ File có trong log nhưng link Pixeldrain đã chết. RE-UPLOAD."
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🆕 File mới hoàn toàn. UPLOAD."
          fi

      # ===== BƯỚC 4: TẢI ROM (Cấu hình tối ưu) =====
      - name: Download ROM
        if: steps.check.outputs.skip != 'true'
        run: |
          aria2c -x 16 -s 16 -k 1M \
            --continue=true \
            --max-tries=10 \
            --retry-wait=5 \
            --check-certificate=false \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -o "${{ steps.rom.outputs.file }}" \
            "${{ steps.rom.outputs.url }}"

      # ===== BƯỚC 5: UPLOAD LÊN PIXELDRAIN =====
      - name: Upload to Pixeldrain
        if: steps.check.outputs.skip != 'true'
        id: pd
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          echo "📤 Đang upload: $FILE"

          RESPONSE=$(curl -u ":$PD_API_KEY" -F "file=@${FILE}" https://pixeldrain.com/api/file)
          ID=$(echo "$RESPONSE" | jq -r '.id')

          if [ "$ID" = "null" ] || [ -z "$ID" ]; then
            echo "❌ Upload thất bại!"
            echo "$RESPONSE"
            exit 1
          fi

          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "link=https://pixeldrain.com/u/$ID" >> $GITHUB_OUTPUT

      # ===== BƯỚC 6: GỬI THÔNG BÁO TELEGRAM =====
      - name: Send Telegram
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          LINK="${{ steps.pd.outputs.link }}"
          
          TEXT="<b>🚀 New Socrates ROM Mirror</b>%0A%0A📦 File: <code>$FILE</code>%0A🔗 <a href=\"$LINK\">Download from Pixeldrain</a>"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="$TEXT" \
            -d parse_mode="HTML"

      # ===== BƯỚC 7: LƯU TRẠNG THÁI VÀ PUSH GIT =====
      - name: Save State and Push
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FILE="${{ steps.rom.outputs.file }}"
          ID="${{ steps.pd.outputs.id }}"
          STATE_FILE="rom_uploaded.txt"

          # Xóa dòng cũ nếu file đã tồn tại nhưng cần update ID mới
          sed -i "\|^$FILE|d" "$STATE_FILE"
          echo "$FILE|$ID" >> "$STATE_FILE"

          git add "$STATE_FILE"
          git commit -m "Mirror: $FILE" || exit 0
          
          # Rebase để tránh xung đột nếu workflow chạy song song
          git pull --rebase origin main
          git push origin main
