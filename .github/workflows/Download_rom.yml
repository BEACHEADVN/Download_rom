name: Socrates ROM Ultimate Mirror - Final Hope

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - name: Install Python Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install cloudscraper jq

      # ===== BƯỚC 2: DÙNG PYTHON ĐỂ LẤY LINK (BYPASS CLOUDFLARE) =====
      - name: Get ROM Link with Cloudscraper
        id: rom
        run: |
          python3 <<EOF
          import cloudscraper
          import re
          import os

          scraper = cloudscraper.create_scraper()
          base_url = "https://sourceforge.net/projects/eliteroms/files/HyperOS-STABLE-UPDATES/HyperOS-v3.0/"
          
          # 1. Lấy trang HTML với Cloudscraper (Vượt Cloudflare)
          response = scraper.get(base_url).text
          
          # 2. Tìm file SOCRATES mới nhất
          files = re.findall(r'EliteRomLite_v4.03_SOCRATES[^"]*zip', response)
          if not files:
              print("❌ Không tìm thấy file!")
              exit(1)
          
          latest_file = sorted(list(set(files)))[-1]
          print(f"🚀 Found: {latest_file}")

          # 3. Lấy link download thực tế (theo dõi redirect)
          download_page = f"{base_url}{latest_file}/download"
          # Ghi vào file output của Github Actions
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"file={latest_file}\n")
              f.write(f"url={download_page}\n")
          EOF

      # ===== BƯỚC 3: KIỂM TRA TRẠNG THÁI =====
      - name: Check State
        id: check
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          STATE_FILE="rom_uploaded.txt"
          touch $STATE_FILE
          if grep -Fq "$FILE|" "$STATE_FILE"; then
            ID=$(grep -F "$FILE|" "$STATE_FILE" | head -n1 | cut -d '|' -f2)
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pixeldrain.com/api/file/$ID/info")
            [ "$STATUS" = "200" ] && echo "skip=true" >> $GITHUB_OUTPUT || echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ===== BƯỚC 4: TẢI BẰNG PYTHON (ĐẢM BẢO NHẤT) =====
      - name: Download ROM using Python
        if: steps.check.outputs.skip != 'true'
        run: |
          python3 <<EOF
          import cloudscraper
          import os

          scraper = cloudscraper.create_scraper()
          url = "${{ steps.rom.outputs.url }}"
          filename = "${{ steps.rom.outputs.file }}"
          
          print(f"📥 Đang tải: {filename}")
          with scraper.get(url, stream=True) as r:
              r.raise_for_status()
              with open(filename, 'wb') as f:
                  for chunk in r.iter_content(chunk_size=8192):
                      f.write(chunk)
          print("✅ Tải xong!")
          EOF

      # ===== BƯỚC 5: UPLOAD & TELEGRAM =====
      - name: Upload to Pixeldrain
        if: steps.check.outputs.skip != 'true'
        id: pd
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          # Kiểm tra dung lượng (phải > 1GB)
          SIZE=$(stat -c%s "$FILE")
          if [ $SIZE -lt 1073741824 ]; then echo "❌ Lỗi: File quá nhỏ, tải thất bại!"; exit 1; fi
          
          RESPONSE=$(curl -u ":$PD_API_KEY" -T "$FILE" https://pixeldrain.com/api/file)
          ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "link=https://pixeldrain.com/u/$ID" >> $GITHUB_OUTPUT

      - name: Send Telegram
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TEXT="<b>🚀 Socrates Mirror Success</b>%0A📦 <code>${{ steps.rom.outputs.file }}</code>%0A🔗 <a href=\"${{ steps.pd.outputs.link }}\">Pixeldrain</a>"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" -d chat_id="${CHAT_ID}" -d text="$TEXT" -d parse_mode="HTML"

      - name: Save State
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.rom.outputs.file }}|${{ steps.pd.outputs.id }}" >> rom_uploaded.txt
          git add rom_uploaded.txt
          git commit -m "Mirror: ${{ steps.rom.outputs.file }}"
          git push origin main
