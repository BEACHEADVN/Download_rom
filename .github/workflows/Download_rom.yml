name: Socrates ROM Ultimate Mirror

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ===== BƯỚC 1: GIẢI PHÓNG DUNG LƯỢNG (FIX ERROR 3) =====
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          echo "Dung lượng trống sau khi dọn dẹp:"
          df -h /

      - name: Pull latest state
        run: git pull origin main || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 curl jq

      # ===== BƯỚC 2: LẤY LINK ROM VÀ THIẾT LẬP REFERER (FIX ERROR 22) =====
      - name: Get Latest ROM Info
        id: rom
        run: |
          BASE_URL="https://sourceforge.net/projects/eliteroms/files/HyperOS-STABLE-UPDATES/HyperOS-v3.0/"
          HTML=$(curl -sL "$BASE_URL")

          # Tìm file zip mới nhất cho SOCRATES
          FILE=$(echo "$HTML" | grep -o 'EliteRomLite_v4.03_SOCRATES[^"]*zip' | sort -V | tail -n 1)
          
          # URL kích hoạt mirror tự động của SourceForge
          URL="https://sourceforge.net/projects/eliteroms/files/HyperOS-STABLE-UPDATES/HyperOS-v3.0/$FILE/download"

          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "referer=$BASE_URL" >> $GITHUB_OUTPUT
          echo "🚀 ROM Target: $FILE"

      # ===== BƯỚC 3: KIỂM TRA TRẠNG THÁI FILE =====
      - name: Check State
        id: check
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          STATE_FILE="rom_uploaded.txt"
          touch $STATE_FILE

          if grep -Fq "$FILE|" "$STATE_FILE"; then
            ID=$(grep -F "$FILE|" "$STATE_FILE" | head -n1 | cut -d '|' -f2)
            # Kiểm tra link Pixeldrain còn sống (200 OK) không
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pixeldrain.com/api/file/$ID/info")
            if [ "$STATUS" = "200" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "✅ File đã có và link vẫn sống. Bỏ qua."
            else
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "⚠️ Link cũ đã chết. Tiến hành upload lại."
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🆕 Phát hiện ROM mới."
          fi

      # ===== BƯỚC 4: TẢI ROM VỚI HEADER CHUẨN =====
      - name: Download ROM
        if: steps.check.outputs.skip != 'true'
        run: |
          aria2c -x 16 -s 16 -k 1M \
            --continue=true \
            --max-tries=10 \
            --retry-wait=5 \
            --check-certificate=false \
            --follow-http=true \
            --referer="${{ steps.rom.outputs.referer }}" \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -o "${{ steps.rom.outputs.file }}" \
            "${{ steps.rom.outputs.url }}"

      # ===== BƯỚC 5: UPLOAD LÊN PIXELDRAIN =====
      - name: Upload to Pixeldrain
        if: steps.check.outputs.skip != 'true'
        id: pd
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          echo "📤 Đang upload: $FILE"

          RESPONSE=$(curl -u ":$PD_API_KEY" -F "file=@${FILE}" https://pixeldrain.com/api/file)
          ID=$(echo "$RESPONSE" | jq -r '.id')

          if [ "$ID" = "null" ] || [ -z "$ID" ]; then
            echo "❌ Upload thất bại!"
            echo "$RESPONSE"
            exit 1
          fi

          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "link=https://pixeldrain.com/u/$ID" >> $GITHUB_OUTPUT

      # ===== BƯỚC 6: GỬI TELEGRAM =====
      - name: Send Telegram
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          LINK="${{ steps.pd.outputs.link }}"
          
          TEXT="<b>🚀 Socrates ROM Mirror Update</b>%0A%0A📦 File: <code>$FILE</code>%0A🔗 <a href=\"$LINK\">Download (Pixeldrain)</a>"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="$TEXT" \
            -d parse_mode="HTML"

      # ===== BƯỚC 7: LƯU TRẠNG THÁI =====
      - name: Save State
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FILE="${{ steps.rom.outputs.file }}"
          ID="${{ steps.pd.outputs.id }}"
          STATE_FILE="rom_uploaded.txt"

          sed -i "\|^$FILE|d" "$STATE_FILE"
          echo "$FILE|$ID" >> "$STATE_FILE"

          git add "$STATE_FILE"
          git commit -m "Mirror SOCRATES: $FILE" || exit 0
          git pull --rebase origin main
          git push origin main
