name: Socrates ROM Ultimate Mirror

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y aria2 curl jq

      # ===== BƯỚC 2: LẤY TÊN FILE QUA RSS (KHÔNG BỊ CHẶN) =====
      - name: Get Latest ROM Info
        id: rom
        run: |
          PROJECT="eliteroms"
          FOLDER="HyperOS-STABLE-UPDATES/HyperOS-v3.0"
          # Lấy tên file từ RSS (nhẹ và không bị Cloudflare soi)
          FILE=$(curl -sL "https://sourceforge.net/projects/$PROJECT/rss?path=/$FOLDER" | grep -oP 'EliteRomLite_v4.03_SOCRATES[^ ]*zip' | head -n 1)
          
          if [ -z "$FILE" ]; then echo "❌ Không tìm thấy file!"; exit 1; fi
          
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "project=$PROJECT" >> $GITHUB_OUTPUT
          echo "folder=$FOLDER" >> $GITHUB_OUTPUT
          echo "🚀 Target: $FILE"

      # ===== BƯỚC 3: KIỂM TRA TRẠNG THÁI =====
      - name: Check State
        id: check
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          STATE_FILE="rom_uploaded.txt"
          touch $STATE_FILE
          if grep -Fq "$FILE|" "$STATE_FILE"; then
            ID=$(grep -F "$FILE|" "$STATE_FILE" | head -n1 | cut -d '|' -f2)
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pixeldrain.com/api/file/$ID/info")
            [ "$STATUS" = "200" ] && echo "skip=true" >> $GITHUB_OUTPUT || echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ===== BƯỚC 4: TẢI TRỰC TIẾP TỪ MIRROR (BYPASS GATEWAY) =====
      - name: Download ROM
        if: steps.check.outputs.skip != 'true'
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          PROJ="${{ steps.rom.outputs.project }}"
          FLDR="${{ steps.rom.outputs.folder }}"
          
          # Danh sách các Mirror Châu Á uy tín
          MIRRORS=(
            "https://azt.dl.sourceforge.net/project/$PROJ/$FLDR/$FILE"
            "https://nchc.dl.sourceforge.net/project/$PROJ/$FLDR/$FILE"
            "https://jaist.dl.sourceforge.net/project/$PROJ/$FLDR/$FILE"
            "https://freefr.dl.sourceforge.net/project/$PROJ/$FLDR/$FILE"
          )

          echo "📥 Thử tải từ các Mirror..."
          for url in "${MIRRORS[@]}"; do
            echo "🔗 Thử: $url"
            if aria2c -x 16 -s 16 -k 1M --continue=true --connect-timeout=20 --timeout=20 "$url" -o "$FILE"; then
              echo "✅ Tải thành công từ mirror này!"
              break
            else
              echo "⚠️ Mirror lỗi, thử cái tiếp theo..."
              rm -f "$FILE"
            fi
          done

          if [ ! -s "$FILE" ]; then echo "❌ Tất cả mirror đều thất bại!"; exit 1; fi

      # ===== BƯỚC 5: UPLOAD & TELEGRAM =====
      - name: Upload to Pixeldrain
        if: steps.check.outputs.skip != 'true'
        id: pd
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          RESPONSE=$(curl -u ":$PD_API_KEY" -T "$FILE" https://pixeldrain.com/api/file)
          ID=$(echo "$RESPONSE" | jq -r '.id')
          if [ "$ID" = "null" ] || [ -z "$ID" ]; then exit 1; fi
          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "link=https://pixeldrain.com/u/$ID" >> $GITHUB_OUTPUT

      - name: Send Telegram
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TEXT="<b>🚀 Socrates Mirror Done</b>%0A📦 <code>${{ steps.rom.outputs.file }}</code>%0A🔗 <a href=\"${{ steps.pd.outputs.link }}\">Pixeldrain</a>"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" -d chat_id="${CHAT_ID}" -d text="$TEXT" -d parse_mode="HTML"

      - name: Save State
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.rom.outputs.file }}|${{ steps.pd.outputs.id }}" >> rom_uploaded.txt
          git add rom_uploaded.txt
          git commit -m "Mirror: ${{ steps.rom.outputs.file }}"
          git push origin main
