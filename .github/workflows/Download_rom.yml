name: Socrates ROM Ultimate Mirror

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ===== BƯỚC 1: DỌN DẸP Ổ CỨNG =====
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h /

      - name: Pull latest state
        run: git pull origin main || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq
          # Cài đặt yt-dlp bản mới nhất để xử lý link SourceForge
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      # ===== BƯỚC 2: LẤY THÔNG TIN ROM =====
      - name: Get Latest ROM Info
        id: rom
        run: |
          BASE_URL="https://sourceforge.net/projects/eliteroms/files/HyperOS-STABLE-UPDATES/HyperOS-v3.0/"
          HTML=$(curl -sL "$BASE_URL")
          FILE=$(echo "$HTML" | grep -o 'EliteRomLite_v4.03_SOCRATES[^"]*zip' | sort -V | tail -n 1)
          
          URL="https://sourceforge.net/projects/eliteroms/files/HyperOS-STABLE-UPDATES/HyperOS-v3.0/$FILE/download"

          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "🚀 ROM Target: $FILE"

      # ===== BƯỚC 3: KIỂM TRA TRẠNG THÁI =====
      - name: Check State
        id: check
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          STATE_FILE="rom_uploaded.txt"
          touch $STATE_FILE
          if grep -Fq "$FILE|" "$STATE_FILE"; then
            ID=$(grep -F "$FILE|" "$STATE_FILE" | head -n1 | cut -d '|' -f2)
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pixeldrain.com/api/file/$ID/info")
            if [ "$STATUS" = "200" ]; then echo "skip=true" >> $GITHUB_OUTPUT; else echo "skip=false" >> $GITHUB_OUTPUT; fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ===== BƯỚC 4: TẢI ROM (DÙNG YT-DLP VƯỢT RÀO) =====
      - name: Download ROM
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "📥 Downloading with yt-dlp engine..."
          # yt-dlp tự động xử lý cookie, user-agent và redirect cực tốt
          yt-dlp --get-url "${{ steps.rom.outputs.url }}" > direct_link.txt
          
          FINAL_URL=$(cat direct_link.txt)
          echo "Direct link obtained: $FINAL_URL"

          # Tiến hành tải thật sự
          # --no-part: không tạo file tạm .part
          # --output: đặt tên file chính xác
          yt-dlp --no-part --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
                 -o "${{ steps.rom.outputs.file }}" \
                 "$FINAL_URL"

          # Kiểm tra dung lượng cuối cùng
          if [ ! -s "${{ steps.rom.outputs.file }}" ] || [ $(stat -c%s "${{ steps.rom.outputs.file }}") -lt 104857600 ]; then
            echo "❌ File vẫn lỗi hoặc quá nhỏ!"
            exit 1
          fi

      # ===== BƯỚC 5: UPLOAD PIXELDRAIN =====
      - name: Upload to Pixeldrain
        if: steps.check.outputs.skip != 'true'
        id: pd
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          # Stream upload bằng -T (PUT) để tránh lỗi RAM trên server yếu
          RESPONSE=$(curl -u ":$PD_API_KEY" -T "${FILE}" https://pixeldrain.com/api/file)
          ID=$(echo "$RESPONSE" | jq -r '.id')
          if [ "$ID" = "null" ] || [ -z "$ID" ]; then exit 1; fi
          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "link=https://pixeldrain.com/u/$ID" >> $GITHUB_OUTPUT

      # ===== BƯỚC 6: TELEGRAM =====
      - name: Send Telegram
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TEXT="<b>🚀 Socrates ROM Mirror</b>%0A%0A📦 <code>${{ steps.rom.outputs.file }}</code>%0A🔗 <a href=\"${{ steps.pd.outputs.link }}\">Pixeldrain Link</a>"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" -d chat_id="${CHAT_ID}" -d text="$TEXT" -d parse_mode="HTML"

      # ===== BƯỚC 7: LƯU TRẠNG THÁI =====
      - name: Save State
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          FILE="${{ steps.rom.outputs.file }}"
          ID="${{ steps.pd.outputs.id }}"
          STATE_FILE="rom_uploaded.txt"
          grep -vF "$FILE|" "$STATE_FILE" > "$STATE_FILE.tmp" || true
          mv "$STATE_FILE.tmp" "$STATE_FILE"
          echo "$FILE|$ID" >> "$STATE_FILE"
          git add "$STATE_FILE"
          git commit -m "Mirror: $FILE" || exit 0
          git pull --rebase origin main
          git push origin main
