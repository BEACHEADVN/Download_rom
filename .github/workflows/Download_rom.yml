name: Auto Download Latest Socrates ROM

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # check mỗi 6 tiếng

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ===== INSTALL =====
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 curl grep sed

      # ===== FIND LATEST ROM =====
      - name: Get latest socrates ROM
        id: rom
        run: |
          BASE_URL="https://sourceforge.net/projects/xiaomi-eu-multilang-miui-roms/files/xiaomi.eu/HyperOS-STABLE-RELEASES/HyperOS3.0/"

          HTML=$(curl -s "$BASE_URL")

          FILE=$(echo "$HTML" | grep -o 'xiaomi.eu_SOCRATES_OS3[^"]*zip' | sort -V | tail -n 1)

          if [ -z "$FILE" ]; then
            echo "No ROM found!"
            exit 1
          fi

          echo "Found ROM: $FILE"

          DOWNLOAD_URL="https://netix.dl.sourceforge.net/project/xiaomi-eu-multilang-miui-roms/xiaomi.eu/HyperOS-STABLE-RELEASES/HyperOS3.0/$FILE"

          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

      # ===== DOWNLOAD =====
      - name: Download ROM
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          URL="${{ steps.rom.outputs.url }}"

          aria2c -x 16 -s 16 -k 1M --continue=true -o "$FILE" "$URL"

      # ===== VERIFY =====
      - name: Verify
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          ls -lh "$FILE"
          file "$FILE"

      # ===== UPLOAD PIXELDRAIN =====
      - name: Upload to Pixeldrain
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"

          RESPONSE=$(curl -s -u ":$PD_API_KEY" -F "file=@${FILE}" https://pixeldrain.com/api/file)

          ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | cut -d '"' -f4)

          if [ -z "$ID" ]; then
            echo "Upload failed"
            exit 1
          fi

          LINK="https://pixeldrain.com/u/${ID}"

          echo "## 📦 Latest Socrates ROM" >> "$GITHUB_STEP_SUMMARY"
          echo "$FILE" >> "$GITHUB_STEP_SUMMARY"
          echo "$LINK" >> "$GITHUB_STEP_SUMMARY"

      # ===== SPLIT + ARTIFACT =====
      - name: Split file
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          split -b 1900M "$FILE" part_

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom-parts
          path: part_*
