name: Auto Socrates ROM (Pixeldrain API)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" # mỗi giờ

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ===== PULL STATE =====
      - name: Pull latest
        run: git pull origin main || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 curl

      # ===== GET ROM =====
      - name: Get Latest ROM
        id: rom
        run: |
          BASE_URL="https://sourceforge.net/projects/xiaomi-eu-multilang-miui-roms/files/xiaomi.eu/HyperOS-STABLE-RELEASES/HyperOS3.0/"
          HTML=$(curl -sL "$BASE_URL")

          FILE=$(echo "$HTML" | grep -o 'xiaomi.eu_SOCRATES_OS3[^"]*zip' | sort -V | tail -n 1)

          URL="https://downloads.sourceforge.net/project/xiaomi-eu-multilang-miui-roms/xiaomi.eu/HyperOS-STABLE-RELEASES/HyperOS3.0/$FILE"

          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ===== CHECK STATE (NO NETWORK CHECK) =====
      - name: Check Uploaded State
        id: check
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          STATE_FILE="rom_uploaded.txt"
          touch $STATE_FILE

          echo "Checking for: $FILE"

          if grep -Fq "$FILE|" "$STATE_FILE"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "File đã upload trước đó → SKIP (không check Pixeldrain)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "File mới → upload"
          fi

      # ===== DOWNLOAD =====
      - name: Download ROM
        if: steps.check.outputs.skip != 'true'
        run: |
          aria2c -x 16 -s 16 -k 1M --continue=true \
            -o "${{ steps.rom.outputs.file }}" \
            "${{ steps.rom.outputs.url }}"

      # ===== UPLOAD PIXELDRAIN =====
      - name: Upload to Pixeldrain
        if: steps.check.outputs.skip != 'true'
        id: pd
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"

          RESPONSE=$(curl -u ":$PD_API_KEY" -F "file=@${FILE}" https://pixeldrain.com/api/file)

          ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | cut -d '"' -f4)

          if [ -z "$ID" ]; then
            echo "Upload thất bại!"
            echo "$RESPONSE"
            exit 1
          fi

          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "link=https://pixeldrain.com/u/${ID}" >> $GITHUB_OUTPUT

      # ===== TELEGRAM =====
      - name: Send Telegram Notification
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          LINK="${{ steps.pd.outputs.link }}"

          TEXT="<b>🚀 New Socrates ROM Uploaded!</b>%0A%0A📦 File: <code>$FILE</code>%0A🔗 <a href=\"$LINK\">Download</a>"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="$TEXT" \
            -d parse_mode="HTML"

      # ===== SAVE STATE =====
      - name: Save State and Push
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FILE="${{ steps.rom.outputs.file }}"
          ID="${{ steps.pd.outputs.id }}"
          STATE_FILE="rom_uploaded.txt"

          echo "$FILE|$ID" >> "$STATE_FILE"

          git add "$STATE_FILE"
          git commit -m "Add ROM: $FILE" || exit 0

          git pull --rebase origin main
          git push origin main
