name: Get HyperTN JavaScript Data
on:
  workflow_dispatch:

jobs:
  fetch-info:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Scrape Hidden Data
        id: scrape
        run: |
          set -e

          echo "Đang tải mã nguồn chứa dữ liệu động..."
          curl -s -L -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               "https://www.hypertn.io.vn/download" > source.html

          echo "=== KẾT QUẢ TÌM KIẾM TỪ KHÓA K90 ==="
          
          # Cách 1: Tìm các dòng chứa từ khóa K90 (bất kể hoa thường) để xem cấu trúc lưu ở đâu
          grep -i "k90" source.html | head -n 30 || true
          
          # Cách 2: Trích xuất thử đường link .zip đi kèm dòng có chứa K90 trong mã nguồn
          # Sử dụng grep với ngữ cảnh (Context) xung quanh từ khóa K90
          DOWNLOAD_URL=$(grep -i -oE 'href="[^"]+"' source.html | grep -i "k90" | head -n 1 | cut -d'"' -f2 || true)
          
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "Không tìm thấy link K90 dạng href truyền thống."
            echo "url=NOT_FOUND" >> $GITHUB_OUTPUT
            echo "filename=NOT_FOUND" >> $GITHUB_OUTPUT
          else
            FILE_NAME=$(basename "$DOWNLOAD_URL" | cut -d'?' -f1)
            echo "Tìm thấy Link: $DOWNLOAD_URL"
            echo "Tìm thấy File: $FILE_NAME"
            
            echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
            echo "filename=$FILE_NAME" >> $GITHUB_OUTPUT
          fi

      - name: View Result
        run: |
          echo "URL: ${{ steps.scrape.outputs.url }}"
          echo "FILE: ${{ steps.scrape.outputs.filename }}"
