name: Check SUSFS Module Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *" # 12:00 PM VN

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull latest
        run: git pull origin main || true

      - name: Get Release
        id: info
        run: |
          JSON=$(curl -s https://api.github.com/repos/sidex15/susfs4ksu-module/releases/latest)
          TAG=$(echo "$JSON" | jq -r '.tag_name')
          
          # Lấy thông tin asset zip
          ASSET=$(echo "$JSON" | jq -r '.assets[] | select(.name | endswith(".zip"))' | head -n 1)
          FILE_NAME=$(echo "$ASSET" | jq -r '.name')
          DL_URL=$(echo "$ASSET" | jq -r '.browser_download_url')
          SIZE=$(echo "$ASSET" | jq -r '.size')
          DATE=$(echo "$JSON" | jq -r '.published_at')

          if [ -z "$FILE_NAME" ] || [ "$FILE_NAME" = "null" ]; then
            FILE_NAME="susfs4ksu-${TAG}.zip"
            DL_URL="https://github.com/sidex15/susfs4ksu-module/archive/refs/tags/${TAG}.zip"
            SIZE="0"
            DATE=$(echo "$JSON" | jq -r '.created_at')
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "dl_url=$DL_URL" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Check State
        id: check
        run: |
          touch susfs_state.txt
          if [ "${{ steps.info.outputs.tag }}" = "$(cat susfs_state.txt)" ]; then echo "skip=true" >> $GITHUB_OUTPUT; fi

      - name: Download
        if: steps.check.outputs.skip != 'true'
        run: curl -L -o "${{ steps.info.outputs.file_name }}" "${{ steps.info.outputs.dl_url }}"

      - name: Telegram
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: python
        run: |
          import os, requests, datetime
          
          def get_size(b):
              for unit in ['B','KB','MB']:
                  if b < 1024: return f"{b:.2f} {unit}"
                  b /= 1024
          
          tag, file_name = "${{ steps.info.outputs.tag }}", "${{ steps.info.outputs.file_name }}"
          size = get_size(int("${{ steps.info.outputs.size }}"))
          date_raw = "${{ steps.info.outputs.date }}"
          date_obj = datetime.datetime.strptime(date_raw, "%Y-%m-%dT%H:%M:%SZ") + datetime.timedelta(hours=7)
          date_str = date_obj.strftime("%d/%m/%Y %H:%M")

          caption = (f"<b>🚀 SUSFS Module Update!</b>\n\n"
                     f"📦 Phiên bản: <code>{tag}</code>\n"
                     f"📊 Dung lượng: <code>{size}</code>\n"
                     f"📅 Cập nhật: <code>{date_str}</code>")
          
          with open(file_name, 'rb') as f:
              requests.post(f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendDocument", 
                            data={'chat_id': os.environ['CHAT_ID'], 'caption': caption, 'parse_mode': 'HTML'}, 
                            files={'document': (file_name, f)})

      - name: Save
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "${{ steps.info.outputs.tag }}" > susfs_state.txt
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add susfs_state.txt
          git commit -m "Update SUSFS to ${{ steps.info.outputs.tag }}" && git push
