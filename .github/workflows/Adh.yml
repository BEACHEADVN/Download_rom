name: Kemono Auto Post Downloader (Super Scraper)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq
          pip install beautifulsoup4 requests

      # ===== LOGIC CÀO LINK VÀ TẢI FILE =====
      - name: Scrape and Download
        id: scraper
        shell: python
        run: |
            import os, requests, sys, re, urllib.parse
            from bs4 import BeautifulSoup

            post_url = "https://kemono.cr/patreon/user/131186049/post/117252586"
            
            headers = {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
                'Referer': 'https://kemono.cr/',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8',
                'Accept-Language': 'en-US,en;q=0.5'
            }

            try:
                print(f"🔍 Đang quét bài viết: {post_url}")
                # Sử dụng session để giữ cookie nếu có redirect
                session = requests.Session()
                response = session.get(post_url, headers=headers, timeout=30)
                
                if response.status_code != 200:
                    print(f"❌ Lỗi truy cập: Status {response.status_code}")
                    sys.exit(1)

                soup = BeautifulSoup(response.text, 'html.parser')
                
                # Tìm tất cả các link chứa '/data/' - Đây là dấu hiệu của file đính kèm trên Kemono
                links = soup.find_all('a', href=True)
                target_links = []
                
                for l in links:
                    href = l['href']
                    # Lọc các link dẫn tới server data của kemono
                    if '/data/' in href and not any(ext in href.lower() for ext in ['.jpg', '.png', '.webp', '.mp4']):
                        if href.startswith('/'):
                            href = "https://kemono.cr" + href
                        target_links.append((href, l))

                # Nếu vẫn không thấy, thử lấy cả file zip/rar dù không có class attachment
                if not target_links:
                     for l in links:
                        href = l['href']
                        if any(ext in href.lower() for ext in ['.zip', '.rar', '.7z']):
                            if href.startswith('/'):
                                href = "https://kemono.cr" + href
                            target_links.append((href, l))

                downloaded_files = []
                
                # Loại bỏ link trùng lặp
                unique_links = list(set([t[0] for t in target_links]))
                print(f"📂 Tìm thấy {len(unique_links)} file tiềm năng.")

                for idx, link in enumerate(unique_links):
                    # Tìm lại node tương ứng để lấy tên file
                    node = next(t[1] for t in target_links if t[0] == link)
                    
                    # Ưu tiên lấy tên từ tham số ?f= vì nó chứa tên file gốc
                    query_params = urllib.parse.parse_qs(urllib.parse.urlparse(link).query)
                    file_name = query_params.get('f', [None])[0]
                    
                    if not file_name:
                        file_name = node.get('download') or link.split('/')[-1].split('?')[0]

                    file_name = urllib.parse.unquote(file_name)
                    file_name = re.sub(r'[\\/*?:"<>|]', "", file_name)

                    print(f"⏳ Đang tải: {file_name} từ {link}")
                    
                    with session.get(link, headers=headers, stream=True) as r:
                        r.raise_for_status()
                        with open(file_name, 'wb') as f:
                            for chunk in r.iter_content(chunk_size=8192):
                                f.write(chunk)
                    
                    if os.path.exists(file_name) and os.path.getsize(file_name) > 0:
                        print(f"✅ Đã tải xong: {file_name}")
                        downloaded_files.append(file_name)

                if not downloaded_files:
                    print("❌ Vẫn không tìm thấy file zip/đính kèm nào!")
                    # Debug: In ra 1000 ký tự đầu của body để kiểm tra
                    print("--- DEBUG HTML CONTENT ---")
                    print(response.text[:1000])
                    sys.exit(1)

                with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                    f.write(f"files={','.join(downloaded_files)}\n")

            except Exception as e:
                print(f"❌ Lỗi hệ thống: {e}")
                sys.exit(1)

      # ===== UPLOAD TẤT CẢ FILE LÊN PIXELDRAIN =====
      - name: Upload to Pixeldrain
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          IFS=',' read -ra FILES_ARRAY <<< "${{ steps.scraper.outputs.files }}"
          for FILE in "${FILES_ARRAY[@]}"; do
            echo "🚀 Đang upload: $FILE"
            if [ -z "$PD_API_KEY" ]; then
              RESPONSE=$(curl -F "file=@$FILE" https://pixeldrain.com/api/file)
            else
              RESPONSE=$(curl -u ":$PD_API_KEY" -F "file=@$FILE" https://pixeldrain.com/api/file)
            fi
            ID=$(echo "$RESPONSE" | jq -r '.id')
            echo "✅ Link: https://pixeldrain.com/u/$ID"
          done
