name: Kemono Ultimate Fix Downloader

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ===== BƯỚC QUAN TRỌNG: FIX DNS =====
      - name: Fix DNS Resolution
        run: |
          sudo echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf > /dev/null
          sudo echo "nameserver 8.8.4.4" | sudo tee -a /etc/resolv.conf > /dev/null
          ping -c 2 kemono.su || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq
          pip install requests

      # ===== TẢI FILE BẰNG PYTHON (API BẢN .SU) =====
      - name: Fetch and Download
        id: scraper
        shell: python
        run: |
            import os, requests, sys, urllib.parse, time

            # Sử dụng domain .su thay vì .cr để tránh lỗi phân giải DNS
            service = "patreon"
            user_id = "131186049"
            post_id = "117252586"
            api_url = f"https://kemono.su/api/v1/{service}/user/{user_id}/post/{post_id}"
            
            headers = {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
                'Accept': 'application/json',
                'Referer': 'https://kemono.su/'
            }

            try:
                print(f"📡 Đang kết nối tới API: {api_url}")
                # Thử lại 3 lần nếu gặp lỗi kết nối
                for i in range(3):
                    try:
                        response = requests.get(api_url, headers=headers, timeout=30)
                        if response.status_code == 200: break
                    except:
                        time.sleep(5)
                
                if response.status_code != 200:
                    print(f"❌ API vẫn lỗi (Status: {response.status_code})")
                    # In thử nội dung lỗi để xem có phải bị Cloudflare chặn không
                    print(f"Nội dung phản hồi: {response.text[:500]}")
                    sys.exit(1)
                
                data = response.json()
                post_data = data[0] if isinstance(data, list) else data
                attachments = post_data.get('attachments', [])
                
                # Thêm file chính vào danh sách tải nếu có
                main_file = post_data.get('file')
                if main_file and main_file.get('path'):
                    attachments.append(main_file)

                if not attachments:
                    print("❌ Không tìm thấy file nào trong bài viết này!")
                    sys.exit(1)

                downloaded_files = []
                for file_info in attachments:
                    path = file_info.get('path')
                    name = file_info.get('name') or path.split('/')[-1]
                    
                    # Thử các server data khác nhau (n4, n3, n5 hoặc server chính)
                    servers = ["https://n4.kemono.su", "https://n3.kemono.su", "https://kemono.su"]
                    success = False
                    
                    for srv in servers:
                        dl_url = f"{srv}/data{path}?f={urllib.parse.quote(name)}"
                        print(f"⏳ Đang thử tải từ: {srv}")
                        try:
                            with requests.get(dl_url, headers=headers, stream=True, timeout=60) as r:
                                if r.status_code == 200:
                                    with open(name, 'wb') as f:
                                        for chunk in r.iter_content(chunk_size=8192):
                                            f.write(chunk)
                                    success = True
                                    break
                        except: continue
                    
                    if success:
                        print(f"✅ Tải thành công: {name}")
                        downloaded_files.append(name)

                with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                    f.write(f"files={','.join(downloaded_files)}\n")

            except Exception as e:
                print(f"❌ Lỗi hệ thống: {e}")
                sys.exit(1)

      # ===== UPLOAD LÊN PIXELDRAIN =====
      - name: Upload to Pixeldrain
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          IFS=',' read -ra FILES_ARRAY <<< "${{ steps.scraper.outputs.files }}"
          for FILE in "${FILES_ARRAY[@]}"; do
            echo "🚀 Uploading: $FILE"
            if [ -z "$PD_API_KEY" ]; then
              RESPONSE=$(curl -F "file=@$FILE" https://pixeldrain.com/api/file)
            else
              RESPONSE=$(curl -u ":$PD_API_KEY" -F "file=@$FILE" https://pixeldrain.com/api/file)
            fi
            ID=$(echo "$RESPONSE" | jq -r '.id')
            echo "✅ Link: https://pixeldrain.com/u/$ID"
          done
