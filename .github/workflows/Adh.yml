name: Kemono Advanced Downloader

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      # ===== TẢI FILE VỚI BỘ HEADER GIẢ LẬP TRÌNH DUYỆT TỐI ĐA =====
      - name: Download File
        id: dl
        run: |
          # URL CỦA BẠN (HÃY ĐẢM BẢO LẤY LINK MỚI NHẤT TRƯỚC KHI BẤM RUN)
          URL="https://n4.kemono.cr/data/c6/6f/c66fbfcc3f6aedd89bdf9347bcd556221436b47a6be071048fcf3871b97def99.zip?f=%5B4KB%5DN132+White+Bikini_74.zip"
          FILE_NAME="N132_White_Bikini_74.zip"
          
          echo "Đang tải file với bộ Header nâng cao..."
          
          # Sử dụng wget hoặc curl với bộ thông số mô phỏng Chrome trên Windows
          # Thêm các header quan trọng mà Kemono thường kiểm tra
          curl -L -k \
               -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
               -H "Referer: https://kemono.cr/" \
               -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7" \
               -H "Accept-Language: en-US,en;q=0.9" \
               -H "Connection: keep-alive" \
               --retry 5 \
               --retry-delay 5 \
               --max-time 600 \
               -o "$FILE_NAME" \
               "$URL"

          # Kiểm tra dung lượng thực tế
          SIZE_BYTES=$(stat -c%s "$FILE_NAME" 2>/dev/null || echo 0)
          
          if [ "$SIZE_BYTES" -lt 1024 ]; then
            echo "❌ Lỗi: File quá nhỏ hoặc trống ($SIZE_BYTES bytes). Link đã hết hạn hoặc bị chặn."
            # In ra nội dung nhận được để debug (có thể là trang lỗi HTML)
            cat "$FILE_NAME" | head -n 20
            exit 1
          fi
          
          echo "✅ Tải thành công! Dung lượng: $(ls -lh "$FILE_NAME" | awk '{print $5}')"
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT

      # ===== UPLOAD LÊN PIXELDRAIN =====
      - name: Upload to Pixeldrain
        id: pd
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          FILE="${{ steps.dl.outputs.file_name }}"
          
          echo "Đang upload lên Pixeldrain..."
          if [ -z "$PD_API_KEY" ]; then
            RESPONSE=$(curl -F "file=@${FILE}" https://pixeldrain.com/api/file)
          else
            RESPONSE=$(curl -u ":$PD_API_KEY" -F "file=@${FILE}" https://pixeldrain.com/api/file)
          fi
          
          ID=$(echo "$RESPONSE" | jq -r '.id')
          
          if [ "$ID" = "null" ] || [ -z "$ID" ]; then
            echo "❌ Upload thất bại!"
            echo "$RESPONSE"
            exit 1
          fi
          
          echo "✅ Upload hoàn tất!"
          echo "🔗 Link của bạn: https://pixeldrain.com/u/$ID"
