name: Kemono Auto Post Downloader (Fixed)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq
          pip install beautifulsoup4 requests

      # ===== LOGIC CÀO LINK VÀ TẢI FILE =====
      - name: Scrape and Download
        id: scraper
        shell: python
        run: |
            import os, requests, sys, re, urllib.parse
            from bs4 import BeautifulSoup

            # URL bài viết bạn cung cấp
            post_url = "https://kemono.cr/patreon/user/131186049/post/117252586"
            
            headers = {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
                'Referer': 'https://kemono.cr/'
            }

            try:
                print(f"🔍 Đang quét bài viết: {post_url}")
                response = requests.get(post_url, headers=headers, timeout=30)
                if response.status_code != 200:
                    print(f"❌ Không thể truy cập bài viết (Status: {response.status_code})")
                    sys.exit(1)

                soup = BeautifulSoup(response.text, 'html.parser')
                
                # Tìm các link download đính kèm
                # Ưu tiên các link có class 'post__attachment-link'
                attachment_nodes = soup.find_all('a', class_='post__attachment-link')
                
                # Nếu không thấy class đó, tìm các link chứa '/data/' và có đuôi .zip
                if not attachment_nodes:
                    attachment_nodes = soup.find_all('a', href=re.compile(r'/data/.*\.zip'))

                downloaded_files = []
                
                for idx, attach in enumerate(attachment_nodes):
                    link = attach['href']
                    if link.startswith('/'):
                        link = "https://kemono.cr" + link
                    
                    # Lấy tên file: ưu tiên attribute 'download', sau đó là tham số '?f=', cuối cùng là từ link
                    file_name = attach.get('download')
                    if not file_name:
                        query_params = urllib.parse.parse_qs(urllib.parse.urlparse(link).query)
                        file_name = query_params.get('f', [None])[0]
                    
                    if not file_name:
                        file_name = link.split('/')[-1].split('?')[0]

                    # Giải mã tên file (ví dụ %20 -> khoảng trắng)
                    file_name = urllib.parse.unquote(file_name)
                    # Loại bỏ ký tự lạ trong tên file để tránh lỗi hệ thống
                    file_name = re.sub(r'[\\/*?:"<>|]', "", file_name)

                    print(f"⏳ Đang tải: {file_name}")
                    
                    with requests.get(link, headers=headers, stream=True) as r:
                        r.raise_for_status()
                        with open(file_name, 'wb') as f:
                            for chunk in r.iter_content(chunk_size=8192):
                                f.write(chunk)
                    
                    if os.path.exists(file_name) and os.path.getsize(file_name) > 0:
                        print(f"✅ Đã tải xong: {file_name} ({os.path.getsize(file_name)} bytes)")
                        downloaded_files.append(file_name)

                if not downloaded_files:
                    print("❌ Không tìm thấy file nào để tải!")
                    sys.exit(1)

                # Lưu danh sách file vào GITHUB_OUTPUT
                with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                    f.write(f"files={','.join(downloaded_files)}\n")

            except Exception as e:
                print(f"❌ Lỗi: {e}")
                sys.exit(1)

      # ===== UPLOAD TẤT CẢ FILE LÊN PIXELDRAIN =====
      - name: Upload to Pixeldrain
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          # Đọc danh sách file từ bước scraper
          IFS=',' read -ra FILES_ARRAY <<< "${{ steps.scraper.outputs.files }}"
          for FILE in "${FILES_ARRAY[@]}"; do
            echo "🚀 Đang upload: $FILE"
            
            if [ -z "$PD_API_KEY" ]; then
              RESPONSE=$(curl -F "file=@$FILE" https://pixeldrain.com/api/file)
            else
              RESPONSE=$(curl -u ":$PD_API_KEY" -F "file=@$FILE" https://pixeldrain.com/api/file)
            fi
            
            ID=$(echo "$RESPONSE" | jq -r '.id')
            
            if [ "$ID" != "null" ] && [ -n "$ID" ]; then
              echo "✅ Xong! Link: https://pixeldrain.com/u/$ID"
            else
              echo "❌ Upload lỗi cho file $FILE"
              echo "Response: $RESPONSE"
            fi
          done
