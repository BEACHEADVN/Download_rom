name: Kemono yt-dlp Downloader

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq
          # Cài đặt bản yt-dlp mới nhất
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      # ===== LẤY LINK VÀ TẢI FILE BẰNG YT-DLP =====
      - name: Download with yt-dlp
        id: dl
        run: |
          # URL bài viết (Sử dụng .su thay vì .cr để ổn định hơn)
          POST_URL="https://kemono.su/patreon/user/131186049/post/117252586"
          
          echo "🚀 Đang lấy link và tải bằng yt-dlp..."
          
          # yt-dlp sẽ tự động lọc ra các file đính kèm và tải về
          # --get-filename giúp chúng ta biết tên file sau khi tải
          yt-dlp --no-check-certificate \
                 --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
                 --restrict-filenames \
                 "$POST_URL"

          # Tìm các file zip vừa tải về (yt-dlp tải vào thư mục hiện tại)
          FILES=$(ls *.zip 2>/dev/null | tr '\n' ',' | sed 's/,$//')
          
          if [ -z "$FILES" ]; then
            echo "❌ Không tìm thấy file zip nào được tải về!"
            exit 1
          fi
          
          echo "✅ Đã tải: $FILES"
          echo "files=$FILES" >> $GITHUB_OUTPUT

      # ===== UPLOAD LÊN PIXELDRAIN =====
      - name: Upload to Pixeldrain
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          # Đọc danh sách file từ bước trước
          IFS=',' read -ra FILES_ARRAY <<< "${{ steps.dl.outputs.files }}"
          
          for FILE in "${FILES_ARRAY[@]}"; do
            echo "🚀 Đang upload: $FILE"
            
            if [ -z "$PD_API_KEY" ]; then
              RESPONSE=$(curl -F "file=@$FILE" https://pixeldrain.com/api/file)
            else
              RESPONSE=$(curl -u ":$PD_API_KEY" -F "file=@$FILE" https://pixeldrain.com/api/file)
            fi
            
            ID=$(echo "$RESPONSE" | jq -r '.id')
            
            if [ "$ID" != "null" ] && [ -n "$ID" ]; then
              echo "✅ Thành công! Link: https://pixeldrain.com/u/$ID"
            else
              echo "❌ Lỗi upload file: $FILE"
              echo "Phản hồi từ server: $RESPONSE"
            fi
          done
