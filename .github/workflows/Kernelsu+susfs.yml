name: GKI KernelSU SUSFS Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" # Chạy vào phút thứ 0 của mỗi giờ
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ===== PULL LATEST STATE =====
      - name: Pull latest
        run: git pull origin main || true

      # ===== GET RELEASE INFO FOR MULTIPLE KERNELS =====
      - name: Get Release Info
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
            import os, requests, json, re

            repo = "WildKernels/GKI_KernelSU_SUSFS"
            headers = {"Authorization": f"token {os.environ['GH_TOKEN']}"}
            
            # Cấu hình các phiên bản đích cần tìm kiếm chính xác
            target_versions = ["5.15.167", "5.15.170", "5.15.189"]
            target_os = "android13"
            
            try:
                # Lấy danh sách các bản phát hành gần đây
                response = requests.get(f"https://api.github.com/repos/{repo}/releases", headers=headers)
                releases = response.json()
                
                found_data = {}
                
                # Quét qua danh sách release để bắt đúng các bản phối hợp yêu cầu
                for r in releases:
                    tag_name = r.get('tag_name', '')
                    
                    for v in target_versions:
                        # Nếu phiên bản đó đã tìm thấy ở release mới hơn rồi thì bỏ qua
                        if v in found_data:
                            continue
                            
                        # Kiểm tra xem tag hoặc tiêu đề có chứa dạng mong muốn hay không (ví dụ: 5.15.167-android13)
                        match_pattern = f"{v}-{target_os}"
                        if match_pattern in tag_name or match_pattern in r.get('name', ''):
                            assets = r.get('assets', [])
                            # Ưu tiên tìm file zip chứa trong release
                            zip_asset = next((a for a in assets if a['name'].endswith('.zip')), None)
                            
                            if zip_asset:
                                file_name = zip_asset['name']
                                dl_url = zip_asset['browser_download_url']
                                size = zip_asset['size']
                            else:
                                file_name = f"GKI-{tag_name}.zip"
                                dl_url = f"https://github.com/{repo}/archive/refs/tags/{tag_name}.zip"
                                size = 0
                                
                            found_data[v] = {
                                "tag": tag_name,
                                "file_name": file_name,
                                "dl_url": dl_url,
                                "size": size,
                                "date": r.get('published_at', r.get('created_at', ''))
                            }
                
                # Đọc trạng thái cũ để so sánh
                state_file = "brene_state.txt"
                old_states = {}
                if os.path.exists(state_file):
                    with open(state_file, 'r') as sf:
                        for line in sf:
                            if '=' in line:
                                k, v = line.strip().split('=', 1)
                                old_states[k] = v
                
                # Kiểm tra xem có phiên bản nào mới hơn trạng thái đã lưu không
                update_v = None
                for v in target_versions:
                    if v in found_data:
                        current_tag = found_data[v]["tag"]
                        if old_states.get(v) != current_tag:
                            # Tìm thấy bản cập nhật mới nhất (chọn bản này để xử lý và đẩy thông báo)
                            update_v = v
                            break
                
                with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                    if update_v:
                        res = found_data[update_v]
                        f.write(f"skip=false\n")
                        f.write(f"ver_key={update_v}\n")
                        f.write(f"tag={res['tag']}\n")
                        f.write(f"file_name={res['file_name']}\n")
                        f.write(f"dl_url={res['dl_url']}\n")
                        f.write(f"size={res['size']}\n")
                        f.write(f"date={res['date']}\n")
                        print(f"Found new update for version: {update_v} (Tag: {res['tag']})")
                    else:
                        f.write("skip=true\n")
                        print("No new updates found for any target versions.")
                        
            except Exception as e:
                print(f"CRITICAL ERROR: {e}")
                exit(1)

      # ===== DOWNLOAD =====
      - name: Download
        if: steps.info.outputs.skip != 'true'
        run: curl -L -o "${{ steps.info.outputs.file_name }}" "${{ steps.info.outputs.dl_url }}"

      # ===== NOTIFICATION (TELEGRAM LINK) =====
      - name: Send Notification to Telegram
        if: steps.info.outputs.skip != 'true'
        uses: xireiki/channel-post@v1
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_USER_ID }}
          context: |
            https://github.com/WildKernels/GKI_KernelSU_SUSFS
          parse_mode: HTML
          method: sendMessage

      # ===== UPLOAD FILE TO TELEGRAM =====
      - name: Telegram Upload
        if: steps.info.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: python
        run: |
          import os, requests, datetime
          def get_size(b):
              b = int(b)
              for unit in ['B','KB','MB']:
                  if b < 1024: return f"{b:.2f} {unit}"
                  b /= 1024
          
          tag, file_name = "${{ steps.info.outputs.tag }}", "${{ steps.info.outputs.file_name }}"
          size = get_size("${{ steps.info.outputs.size }}")
          date_raw = "${{ steps.info.outputs.date }}"
          ver_key = "${{ steps.info.outputs.ver_key }}"
          
          try:
              date_obj = datetime.datetime.strptime(date_raw, "%Y-%m-%dT%H:%M:%SZ") + datetime.timedelta(hours=7)
              date_str = date_obj.strftime("%d/%m/%Y %H:%M")
          except:
              date_str = "N/A"

          caption = f"<b>🚀 GKI SUSFS Update ({ver_key})!</b>\n\n📦 Phiên bản: <code>{tag}</code>\n📊 Dung lượng: <code>{size}</code>\n📅 Cập nhật: <code>{date_str}</code>"
          
          with open(file_name, 'rb') as f:
              requests.post(f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendDocument", 
                            data={'chat_id': os.environ['CHAT_ID'], 'caption': caption, 'parse_mode': 'HTML'}, 
                            files={'document': (file_name, f)})

      # ===== SAVE STATE & SAFE PUSH =====
      - name: Save State
        if: steps.info.outputs.skip != 'true'
        run: |
          # Đọc file hiện tại tạo dict
          touch brene_state.txt
          python3 -c "
          import os
          lines = {}
          if os.path.exists('brene_state.txt'):
              for l in open('brene_state.txt'):
                  if '=' in l: k, v = l.strip().split('=', 1); lines[k] = v
          lines['${{ steps.info.outputs.ver_key }}'] = '${{ steps.info.outputs.tag }}'
          with open('brene_state.txt', 'w') as f:
              for k, v in lines.items(): f.write(f'{k}={v}\n')
          "
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brene_state.txt
          git commit -m "Update GKI Kernel ${{ steps.info.outputs.ver_key }} to ${{ steps.info.outputs.tag }}" || exit 0
          git pull --rebase origin main
          git push origin main
